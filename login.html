<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VYROVA – AI Creative Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #080810;
      --surface: #0f0f1a;
      --border: rgba(120,80,255,0.18);
      --accent: #7c3aed;
      --accent2: #a855f7;
      --glow: #c084fc;
      --text: #f1f0ff;
      --muted: #8b8aab;
      --error: #f87171;
      --success: #34d399;
      --card: rgba(15,15,26,0.85);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Background Canvas ── */
    #bg-canvas {
      position: fixed; inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Grid lines ── */
    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    /* ── Glow blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.3), transparent 70%);
      top: -150px; left: -100px;
      animation: float1 9s ease-in-out infinite;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
      bottom: -100px; right: -80px;
      animation: float2 11s ease-in-out infinite;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(192,132,252,0.12), transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      animation: pulse-blob 6s ease-in-out infinite;
    }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }
    @keyframes pulse-blob { 0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)} }

    /* ── Main Card ── */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 460px;
      padding: 20px;
      animation: slideUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(40px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px 44px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(124,58,237,0.1),
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--glow), transparent);
    }

    /* ── Logo ── */
    .logo-area {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo-img {
      width: 52px; height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(168,85,247,0.3);
      box-shadow: 0 0 20px rgba(124,58,237,0.4);
      object-fit: cover;
    }

    .logo-text-group {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(135deg, #c084fc, #7c3aed, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── Heading ── */
    .card-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--muted);
      width: 16px; height: 16px;
      pointer-events: none;
      transition: color 0.3s;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }

    input:focus {
      border-color: var(--accent2);
      background: rgba(124,58,237,0.08);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
    }

    input:focus ~ .input-icon,
    .input-wrap:focus-within .input-icon {
      color: var(--accent2);
    }

    .eye-toggle {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      padding: 4px;
      transition: color 0.3s;
    }
    .eye-toggle:hover { color: var(--accent2); }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.5s;
    }

    .btn-login:hover::before { left: 100%; }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(124,58,237,0.55);
    }
    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Message ── */
    .msg {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .msg.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .msg.success { background: rgba(52,211,153,0.1);  border: 1px solid rgba(52,211,153,0.3);  color: var(--success); }
    .msg.show { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

    /* ── Footer ── */
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .footer-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent2);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .footer-text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── IP Badge ── */
    .ip-badge {
      position: absolute;
      top: 16px; right: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .ip-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: blink 1.5s ease-in-out infinite;
    }

    /* ── Floating particles ── */
    .particle {
      position: fixed;
      width: 2px; height: 2px;
      border-radius: 50%;
      background: var(--accent2);
      pointer-events: none;
      z-index: 1;
      animation: particleFly linear infinite;
      opacity: 0;
    }

    @keyframes particleFly {
      0%   { opacity:0; transform: translateY(100vh) scale(0); }
      10%  { opacity:1; }
      90%  { opacity:1; }
      100% { opacity:0; transform: translateY(-100px) scale(1); }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="grid-overlay"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Particles -->
  <script>
    for(let i=0;i<18;i++){
      const p=document.createElement('div');
      p.className='particle';
      p.style.cssText=`left:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*8}s;opacity:${Math.random()*0.5+0.2};`;
      document.body.appendChild(p);
    }
  </script>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="card">

      

      <div class="logo-area">
        <img
          src="https://i.ibb.co/5XQLZbcm/Tool-Logo.png"
          alt="VYROVA Logo"
          class="logo-img"
          onerror="this.style.display='none'"
        />
        <div class="logo-text-group">
          <div class="logo-name">VYROVA</div>
          <div class="logo-sub">AI Creative Center</div>
        </div>
      </div>

      <div class="card-title">Welcome Back</div>
      <div class="card-desc">Sign in to access your creative workspace.</div>

      <div class="form-group">
        <label>Username / Phone</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="text" id="email" placeholder="Phone or Email" autocomplete="username"/>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
          <button class="eye-toggle" type="button" onclick="togglePwd()" title="Show/Hide">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <span id="btn-text">Sign In</span>
        <div class="spinner" id="spinner"></div>
      </button>

      <div class="msg error" id="error-msg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="error-text">Invalid credentials.</span>
      </div>

      <div class="msg success" id="success-msg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="success-text">Login successful! Redirecting...</span>
      </div>

      <div class="card-footer">
        <img src="https://i.ibb.co/5XQLZbcm/Tool-Logo.png" alt="Logo" style="width:22px;height:22px;border-radius:6px;opacity:0.7;"/>
        <span class="footer-text">Protected · IP Locked · V1</span>
        <img src="https://i.ibb.co/5XQLZbcm/Tool-Logo.png" alt="Logo" style="width:22px;height:22px;border-radius:6px;opacity:0.7;"/>
      </div>

    </div>
  </div>

  <!-- Firebase SDK — Realtime Database -->
  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAnalytics }    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
    import { getAuth, signInWithEmailAndPassword }
                               from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase, ref, get, update }
                               from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyB_ifbshi2ZGcK0nhq6UiLZsUYRlxyxk1U",
      authDomain:        "vyrova-860b3.firebaseapp.com",
      databaseURL:       "https://vyrova-860b3-default-rtdb.firebaseio.com",
      projectId:         "vyrova-860b3",
      storageBucket:     "vyrova-860b3.firebasestorage.app",
      messagingSenderId: "1084760988508",
      appId:             "1:1084760988508:web:6959662c20638278783f99",
      measurementId:     "G-RVM3PB40TW"
    };

    const app       = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth      = getAuth(app);
    const db        = getDatabase(app);

    /* ── Get public IP ── */
    async function getPublicIP() {
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        const d = await r.json();
        return d.ip;
      } catch { return null; }
    }

    /* ── Helpers ── */
    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('show');
      document.getElementById('success-msg').classList.remove('show');
    }
    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      document.getElementById('success-text').textContent = msg;
      el.classList.add('show');
      document.getElementById('error-msg').classList.remove('show');
    }
    function setLoading(on) {
      document.getElementById('loginBtn').disabled = on;
      document.getElementById('btn-text').style.display = on ? 'none' : 'block';
      document.getElementById('spinner').style.display  = on ? 'block' : 'none';
    }

    /* ── Admin credentials ── */
    const ADMIN_USER = '923220498935';
    const ADMIN_PWD  = 'HaiderAli000';

    /* ── Login handler ── */
    window.handleLogin = async function () {
      const input    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('success-msg').classList.remove('show');

      if (!input || !password) { showError('Please enter credentials.'); return; }

      setLoading(true);

      /* Admin shortcut */
      if (input === ADMIN_USER && password === ADMIN_PWD) {
        showSuccess('Admin verified! Entering dashboard...');
        setTimeout(() => { window.location.href = 'admin.html'; }, 1400);
        return;
      }

      try {
        const currentIP  = await getPublicIP();
        const loginEmail = input.includes('@') ? input : input + '@vyrova.com';

        /* Firebase Auth login */
        const cred = await signInWithEmailAndPassword(auth, loginEmail, password);
        const uid  = cred.user.uid;

        /* Read user from Realtime DB */
        const snap = await get(ref(db, `users/${uid}`));
        const data = snap.val();

        if (!data) {
          await auth.signOut();
          setLoading(false);
          showError('Account not found in system. Contact admin.');
          return;
        }

        /* Plan expiry check */
        const planEnd = data.planEnd ? new Date(data.planEnd) : null;
        if (planEnd && planEnd < new Date()) {
          await auth.signOut();
          setLoading(false);
          showError('Your 30-day plan has expired. Please contact admin.');
          return;
        }

        /* IP Lock check */
        if (data.registeredIP && data.registeredIP !== currentIP) {
          await auth.signOut();
          setLoading(false);
          showError('Access denied. This account is locked to a different device/IP.');
          return;
        }

        /* First login — save IP */
        if (!data.registeredIP && currentIP) {
          await update(ref(db, `users/${uid}`), {
            registeredIP: currentIP,
            lastLogin: new Date().toISOString()
          });
        } else {
          await update(ref(db, `users/${uid}`), {
            lastLogin: new Date().toISOString()
          });
        }

        showSuccess('Welcome back! Loading workspace...');
        setTimeout(() => { window.location.href = 'index.html'; }, 1400);

      } catch (err) {
        setLoading(false);
        const code = err.code || '';
        if      (code === 'auth/user-not-found')     showError('No account found.');
        else if (code === 'auth/wrong-password')     showError('Incorrect password.');
        else if (code === 'auth/invalid-email')      showError('Invalid credentials.');
        else if (code === 'auth/too-many-requests')  showError('Too many attempts. Try later.');
        else if (code === 'auth/invalid-credential') showError('Invalid username or password.');
        else showError('Login failed: ' + (err.message || 'Unknown error.'));
      }
    };

    /* ── Enter key ── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleLogin();
    });
  </script>

  <!-- Password toggle (non-module) -->
  <script>
    function togglePwd() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
  </script>

</body>
</html>
